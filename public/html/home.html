<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PDF Tools</title>
  <link rel="stylesheet" href="/style/style.css" />
</head>

<body>

  <h1>PDF Processing Website</h1>

  <section class="card">
    <h2>Merge PDFs</h2>
    <form action="/merge" method="POST" enctype="multipart/form-data">
  <label class="file-btn">
    Choose files
    <input type="file" name="files" accept="application/pdf" multiple required hidden>
  </label>
  <div class="file-name" id="mergeFilesText">No files chosen</div>

  <button type="submit">Merge PDFs</button>
</form>
    <p class="note">Select 2 or more PDF files</p>
  </section>

  <section class="card">
    <h2>Compress PDF</h2>
    <form action="/compress" method="POST" enctype="multipart/form-data">
  <label class="file-btn">
    Choose file
    <input type="file" name="file" accept="application/pdf" required hidden>
  </label>
  <div class="file-name" id="compressFileText">No file chosen</div>

  <button type="submit">Compress PDF</button>
</form>
    <p class="note">Max size: 15MB</p>
  </section>
<script src="/js/app.js"></script>
</body>
</html>
